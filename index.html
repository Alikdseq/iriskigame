      /* Триколор: белый, красный, жёлтый (равные полосы) */

          to bottom,
          #ffffff 0%,

          #da1c2f 33.33%,

          #ffcd00 100%

        min-height: 100vh;
        display: flex;
        justify-content: center;

      .quiz-card {
        max-width: 800px;
        width: 100%;
        background: rgba(30, 27, 22, 0.85);
        backdrop-filter: blur(3px);
        border-radius: 48px;
        box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5);

      .ornament {

      .ornament span {
        width: 40px;

      .question-header {
        text-align: center;
        margin-bottom: 28px;
      }
      .question-counter {
        background: #da1c2f;

        display: inline-block;

        border-radius: 40px;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 1px;

        font-size: 1.7rem;

      .answers-grid {
        display: grid;

      .answer-btn {
        background: #3a2c1f;

        font-family: inherit;
        word-break: break-word;
      }
      .answer-btn:hover:not(:disabled) {
        background: #5f4630;
        transform: translateY(-2px);
        box-shadow: 0 7px 0 #1f1a12;
      }
      .answer-btn.correct-highlight {
        background: #1f8a4c !important;
        box-shadow: 0 0 12px #7be2a5;
        border: 1px solid #c2ffc2;
        color: white;
      }
      .answer-btn.wrong-highlight {
        background: #b32e1c !important;
        text-decoration: line-through;
        box-shadow: 0 0 8px #ff7f5c;
      }
      .answer-btn:disabled {
        opacity: 0.8;
        cursor: default;
        transform: scale(0.98);
      }

      .next-area {
        text-align: center;
        margin: 10px 0 15px;
      }
      .next-btn {
        background: linear-gradient(95deg, #ffcd00, #e5b800);

        padding: 12px 40px;

        font-weight: bold;
        color: #2d2a1f;

        transition: 0.2s;
        box-shadow: 0 6px 0 #a77c00;

        opacity: 0.6;
        pointer-events: none;
        font-family: inherit;
      }
      .next-btn.active {
        opacity: 1;

        cursor: pointer;
      }
      .next-btn.active:hover {
        background: #ffde5c;
        transform: translateY(-2px);
        box-shadow: 0 8px 0 #a77c00;
      }

      .result-message {
        text-align: center;
        font-size: 1rem;
        margin-top: 12px;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.7);

        border-radius: 40px;
        color: #ffefc0;
      }

      .super-game-message {
        text-align: center;
        font-size: 1.5rem;

        background: #ffcd00;

        padding: 12px;
        border-radius: 60px;
        margin: 20px 0 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        animation: pulse 1s infinite alternate;
      }
      @keyframes pulse {
        from {
          transform: scale(1);
          background: #ffcd00;
        }
        to {
          transform: scale(1.02);
          background: #ffe55c;
        }
      }

      .reward-panel {
        text-align: center;
        margin-top: 20px;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 48px;

      }
      .reward-buttons {
        display: flex;
        justify-content: center;

        margin-top: 20px;

      }
      .reward-btn {
        background: #ffcd00;

        transition: 0.2s;

      }
      .reward-btn:hover {
        background: #ffde6e;

      }

      .final-panel {
        text-align: center;

      .final-box {
        background: #fff2e0;
        border-radius: 60px;
        padding: 24px;
        font-weight: bold;
        font-size: 1.4rem;

        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }
      .restart-btn {
        background: #ffcd00;
        border: none;
        padding: 12px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.2s;
        color: #1f2a13;
        box-shadow: 0 4px 0 #b87d00;
      }
      .restart-btn:hover {
        background: #ffde6e;
        transform: translateY(-2px);
      }

      footer {
        text-align: center;
        font-size: 0.7rem;
        margin-top: 28px;
        color: #fff0c0;
        text-shadow: 0 1px 0 #00000066;
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 999;
      }

      @media (max-width: 600px) {
        .quiz-card {
          padding: 20px 16px;
        }
        .question-text {
          font-size: 1.3rem;
          padding: 16px;
        }
        .answer-btn {
          font-size: 0.9rem;
          padding: 14px 10px;
        }
        .answers-grid {
          gap: 12px;
          margin: 24px 0;
        }
        .super-game-message {
          font-size: 1.2rem;
          padding: 10px;
        }
        .next-btn {
          padding: 10px 30px;
          font-size: 1.2rem;
        }
        .final-box {
          font-size: 1.2rem;
          padding: 20px;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  </head>
  <body>
    <div class="quiz-card" id="quizApp">
      <div class="ornament">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <div id="gameMainArea"></div>
      <footer>
        🏔️ Проверь свои знания об Осетии! Одна ошибка прощается, вторая — конец
        игры 🏔️
      </footer>
    </div>

    <script>
      // ------------------- ВОПРОСЫ (10 базовых) -------------------
      const baseQuestions = [
        {
          text: "Какой вид спорта считается «номером один» в Осетии по количеству олимпийских чемпионов?",
          options: [
            "Футбол",
            "Тяжелая атлетика",
            "Фехтование",
            "Вольная борьба",
          ],
          correct: 3,
        },
        {
          text: "Какое старинное название носит массовый осетинский танец-шествие?",
          options: ["Лезгинка", "Симд", "Хонга", "Алан"],
          correct: 1,
        },
        {
          text: "Как называется высочайший водопад Осетии (и один из самых высоких в Европе), расположенный в Мидаграбинской долине?",
          options: ["Султан", "Медовый", "Девичьи косы", "Большой Зейгалан"],
          correct: 3,
        },
        {
          text: "К какой языковой группе относится осетинский язык?",
          options: [
            "Тюркской",
            "Нахско-дагестанской",
            "Иранской",
            "Картвельской",
          ],
          correct: 2,
        },
        {
          text: "Какое ущелье Осетии печально известно из-за схода ледника Колка в 2002 году?",
          options: ["Фиагдонское", "Кармадонское", "Дигорское", "Кобанское"],
          correct: 1,
        },
        {
          text: "Как назывался первый профессиональный осетинский театр, открывшийся во Владикавказе?",
          options: ["Ирон", "Нарт", "Коста", "Алан"],
          correct: 2,
        },
        {
          text: "Какой генерал-полковник, осетин по национальности, прославился как легендарный разведчик под псевдонимом «Ксанти»?",
          options: [
            "Исса Плиев",
            "Хаджи-Умар Мамсуров",
            "Георгий Хетагуров",
            "Каурбек Черевиков",
          ],
          correct: 1,
        },
        {
          text: "Кто из осетинских военачальников стал единственным в истории СССР дважды Героем Советского Союза и Героем Монгольской Народной Республики?",
          options: [
            "Хаджи-Умар Мамсуров",
            "Георгий Хетагуров",
            "Исса Плиев",
            "Энвер Ахсаров",
          ],
          correct: 2,
        },
        {
          text: "Какой российский император посетил Владикавказ в 1888 году?",
          options: ["Николай I", "Николай II", "Александр II", "Александр III"],
          correct: 3,
        },
        {
          text: "Как называлась первая газета на осетинском языке, вышедшая в 1906 году?",
          options: [
            "«Ирон газет»",
            "«Рæстдзинад»",
            "«Стыр Ныхас»",
            "«Сев. Осетия»",
          ],
          correct: 0,
        },
      ];

      // Супер-вопрос (11-й) про трамвай
      const superQuestion = {
        text: "В каком году во Владикавказе был открыт первый на Кавказе трамвай?",
        options: ["1890", "1925", "1917", "1904"],
        correct: 3,
      };

      let questions = [...baseQuestions];
      let currentIndex = 0;
      let userAnswers = new Array(questions.length).fill(null);
      let answered = false;
      let waitingNext = false;
      let gameActive = true;
      let gameFinished = false;
      let mistakeCount = 0;
      let superGameMode = false; // активна ли супер-игра

      // Функция для салюта
      function burstConfetti(intensity = "medium") {
        if (typeof canvasConfetti === "undefined") return;
        let count = 150,
          spread = 70,
          origin = { y: 0.6 };
        if (intensity === "big") {
          count = 380;
          spread = 100;
        } else if (intensity === "huge") {
          count = 750;
          spread = 120;
          origin = { y: 0.5 };
        }
        canvasConfetti({
          particleCount: count,
          spread,
          origin,
          startVelocity: 20,
          colors: ["#ffcd00", "#da1c2f", "#ffffff", "#f1c40f"],
        });
        if (intensity === "huge") {
          setTimeout(
            () =>
              canvasConfetti({
                particleCount: 400,
                spread: 110,
                origin: { y: 0.4 },
              }),
            150,
          );
          setTimeout(
            () =>
              canvasConfetti({
                particleCount: 350,
                spread: 120,
                origin: { y: 0.7 },
              }),
            300,
          );
        }
      }

      // Подсветка кнопок после ответа
      function applyHighlight(selectedIdx, isCorrect) {
        const btns = document.querySelectorAll(".answer-btn");
        const correctIdx = questions[currentIndex].correct;
        btns.forEach((btn) =>
          btn.classList.remove("correct-highlight", "wrong-highlight"),
        );
        if (!isCorrect) {
          btns[selectedIdx].classList.add("wrong-highlight");
        } else {
          btns[selectedIdx].classList.add("correct-highlight");
        }
        btns[correctIdx].classList.add("correct-highlight");
      }

      function disableAllButtons() {
        document
          .querySelectorAll(".answer-btn")
          .forEach((btn) => (btn.disabled = true));
      }

      // Завершение игры с поражением (2 ошибки)
      function gameOverLose() {
        gameActive = false;
        gameFinished = true;
        const mainDiv = document.getElementById("gameMainArea");
        mainDiv.innerHTML = `
          <div class="final-panel">
            <div class="final-box" style="background: #ffe0cc; color:#8b3c1c;">
              😔 Вторая ошибка! Игра окончена. 😔<br>
              В следующий раз повезёт больше!
            </div>
            <button class="restart-btn" id="restartGameBtn">🔄 Начать заново</button>
          </div>
        `;
        document
          .getElementById("restartGameBtn")
          ?.addEventListener("click", () => location.reload());
      }

      // Обработка ответа
      function handleAnswer(selectedIdx) {
        if (!gameActive || answered || waitingNext || gameFinished) return;
        const q = questions[currentIndex];
        const isCorrect = selectedIdx === q.correct;
        userAnswers[currentIndex] = selectedIdx;

        applyHighlight(selectedIdx, isCorrect);
        disableAllButtons();

        if (!isCorrect) {
          mistakeCount++;
          if (mistakeCount === 1) {
            document.getElementById("resultMsg").innerHTML =
              "⚠️ Одна ошибка прощается! Следующая ошибка завершит игру. ⚠️";
            document.getElementById("resultMsg").style.color = "#ffbc9a";
          } else if (mistakeCount >= 2) {
            gameOverLose();
            return;
          }
        } else {
          burstConfetti("medium");
          document.getElementById("resultMsg").innerHTML =
            "✅ Верно! Молодец! Едем дальше ✅";
          document.getElementById("resultMsg").style.color = "#c8ffb0";
        }

        answered = true;
        waitingNext = true;
        const nextBtn = document.getElementById("nextBtn");
        if (nextBtn) {
          nextBtn.classList.add("active");
          nextBtn.disabled = false;
        }
      }

      function goToNext() {
        if (!gameActive || !waitingNext || gameFinished) return;

        // Если мы в супер-игре и это последний вопрос (индекс 10), то завершаем с проверкой
        if (superGameMode && currentIndex === questions.length - 1) {
          const isCorrect =
            userAnswers[currentIndex] === questions[currentIndex].correct;
          if (isCorrect) {
            burstConfetti("huge");
            for (let i = 0; i < 3; i++)
              setTimeout(() => burstConfetti("big"), i * 350);
            const mainDiv = document.getElementById("gameMainArea");
            mainDiv.innerHTML = `
              <div class="final-panel">
                <div class="final-box" style="background: gold; color:#2d2b1f;">
                  🎉✨ ПОБЕДА! ✨🎉<br>
                  Вы ответили правильно на супер-вопрос!<br>
                  🏆 ВЫ ВЫИГРАЛИ 100$! 🏆<br>
                  Спасибо за игру!
                </div>
                <button class="restart-btn" id="restartGameBtn">🔄 Пройти викторину снова</button>
              </div>
            `;
            document
              .getElementById("restartGameBtn")
              ?.addEventListener("click", () => location.reload());
          } else {
            // Неправильно – выигрыш обнуляется
            const mainDiv = document.getElementById("gameMainArea");
            mainDiv.innerHTML = `
              <div class="final-panel">
                <div class="final-box" style="background: #ffe0cc; color:#8b3c1c;">
                  😔 Вы ответили неправильно на супер-вопрос. Ваш выигрыш обнуляется. 😔<br>
                  Попробуйте ещё раз!
                </div>
                <button class="restart-btn" id="restartGameBtn">🔄 Пройти викторину снова</button>
              </div>
            `;
            document
              .getElementById("restartGameBtn")
              ?.addEventListener("click", () => location.reload());
          }
          gameActive = false;
          gameFinished = true;
          return;
        }

        // Обычный переход к следующему вопросу
        if (currentIndex + 1 < questions.length) {
          currentIndex++;
          answered = false;
          waitingNext = false;
          const nextBtn = document.getElementById("nextBtn");
          if (nextBtn) {
            nextBtn.classList.remove("active");
            nextBtn.disabled = true;
          }
          renderCurrentQuestion();
        } else {
          // Все вопросы базовой части пройдены
          if (!superGameMode) {
            const total = baseQuestions.length;
            let correctCount = 0;
            for (let i = 0; i < total; i++) {
              if (userAnswers[i] === baseQuestions[i].correct) correctCount++;
            }
            if (mistakeCount <= 1 && correctCount >= 9) {
              showIntermediateReward();
            } else {
              finishGameWithLoss();
            }
          }
        }
      }

      // Показать промежуточное вознаграждение после 10 базовых вопросов
      function showIntermediateReward() {
        gameActive = false; // блокируем дальнейшие ответы, пока выбор не сделан
        const mainDiv = document.getElementById("gameMainArea");
        mainDiv.innerHTML = `
          <div class="reward-panel">
            <div class="final-box" style="background: gold; color:#2d2b1f;">
              🎉 Поздравляем! 🎉<br>
              Вы ответили правильно на 9 или 10 вопросов из 10 (допустили не более одной ошибки).<br>
              Вы выиграли 50$!
            </div>
            <div class="reward-buttons">
              <button class="reward-btn" id="takeMoneyBtn">💵 Забрать 50$</button>
              <button class="reward-btn" id="continueGameBtn">🎲 Продолжить игру и удвоить выигрыш</button>
            </div>
          </div>
        `;
        document
          .getElementById("takeMoneyBtn")
          .addEventListener("click", () => {
            burstConfetti("huge");
            for (let i = 0; i < 3; i++)
              setTimeout(() => burstConfetti("big"), i * 350);
            mainDiv.innerHTML = `
            <div class="final-panel">
              <div class="final-box" style="background: gold; color:#2d2b1f;">
                🎉✨ ПОБЕДА! ✨🎉<br>
                Вы выиграли 50$!<br>
                Спасибо за игру!
              </div>
              <button class="restart-btn" id="restartGameBtn">🔄 Пройти викторину снова</button>
            </div>
          `;
            document
              .getElementById("restartGameBtn")
              ?.addEventListener("click", () => location.reload());
          });
        document
          .getElementById("continueGameBtn")
          .addEventListener("click", () => {
            // Начать супер-игру: добавить супер-вопрос в массив, сбросить состояние
            questions = [...baseQuestions, superQuestion];
            currentIndex = baseQuestions.length; // индекс 10 (первый после базовых)
            userAnswers = new Array(questions.length).fill(null);
            // Оставляем текущий mistakeCount (0 или 1), который был накоплен за базовую часть
            // Сбрасываем флаги для супер-игры
            answered = false;
            waitingNext = false;
            gameActive = true;
            gameFinished = false;
            superGameMode = true;
            renderSuperGameStart();
          });
      }

      function renderSuperGameStart() {
        const mainDiv = document.getElementById("gameMainArea");
        mainDiv.innerHTML = `
          <div class="question-header">
            <div class="super-game-message">🔥 СУПЕР ИГРА 🔥</div>
          </div>
          <div class="next-area">
            <button class="next-btn active" id="startSuperBtn">➡️ НАЧАТЬ</button>
          </div>
        `;
        document
          .getElementById("startSuperBtn")
          .addEventListener("click", () => {
            renderCurrentQuestion();
          });
      }

      function finishGameWithLoss() {
        let correctCount = 0;
        for (let i = 0; i < baseQuestions.length; i++) {
          if (userAnswers[i] === baseQuestions[i].correct) correctCount++;
        }
        const mainDiv = document.getElementById("gameMainArea");
        mainDiv.innerHTML = `
          <div class="final-panel">
            <div class="final-box" style="background: #fff2e0;">
              📚 Викторина завершена!<br>
              Правильных ответов: ${correctCount} из ${baseQuestions.length}<br>
              ${mistakeCount === 1 ? "Вы допустили одну ошибку, но для выигрыша необходимо 9 правильных ответов." : "Изучайте Осетию дальше — здесь столько интересного!"}
            </div>
            <button class="restart-btn" id="restartGameBtn">🔄 Начать заново</button>
          </div>
        `;
        document
          .getElementById("restartGameBtn")
          ?.addEventListener("click", () => location.reload());
        gameActive = false;
        gameFinished = true;
      }

      function renderCurrentQuestion() {
        if (!gameActive) return;
        const q = questions[currentIndex];
        const qNumber = currentIndex + 1;
        const total = questions.length;

        const mainDiv = document.getElementById("gameMainArea");
        mainDiv.innerHTML = `
          <div class="question-header">
            <div class="question-counter">Вопрос ${qNumber} / ${total}</div>
            <div class="question-text">${escapeHtml(q.text)}</div>
          </div>
          <div class="answers-grid" id="answersGrid"></div>
          <div class="next-area">
            <button class="next-btn" id="nextBtn" disabled>➡️ ДАЛЬШЕ</button>
          </div>
          <div class="result-message" id="resultMsg"></div>
        `;

        const answersGrid = document.getElementById("answersGrid");
        q.options.forEach((opt, idx) => {
          const btn = document.createElement("button");
          btn.className = "answer-btn";
          btn.innerText = `${String.fromCharCode(65 + idx)}. ${opt}`;
          btn.addEventListener("click", () => handleAnswer(idx));
          answersGrid.appendChild(btn);
        });

        const nextBtn = document.getElementById("nextBtn");
        nextBtn.addEventListener("click", goToNext);
        nextBtn.disabled = true;
        nextBtn.classList.remove("active");
        document.getElementById("resultMsg").innerHTML = "";
        answered = false;
        waitingNext = false;

        // Убираем возможные старые сообщения супер-игры
        const existingSuper = document.querySelector(".super-game-message");
        if (existingSuper) existingSuper.remove();
      }

      function escapeHtml(str) {
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Инициализация
      function initGame() {
        questions = [...baseQuestions];
        currentIndex = 0;
        userAnswers = new Array(questions.length).fill(null);
        answered = false;
        waitingNext = false;
        gameActive = true;
        gameFinished = false;
        mistakeCount = 0;
        superGameMode = false;
        renderCurrentQuestion();
      }

      initGame();
